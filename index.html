<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCN Patòlegs · Sistema de Gestión de Laboratorio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Clinical light palette — BCN Patòlegs */
    --brand:        #0e6b6b;   /* deep medical teal */
    --brand-700:    #0a5252;
    --brand-600:    #0e6b6b;
    --brand-500:    #138a86;
    --brand-50:     #e8f4f3;
    --brand-100:    #d0e9e7;
    --accent:       #c2410c;   /* clinical coral (urgents) */

    --bg:           #f4f6f9;
    --surface:      #ffffff;
    --surface-2:    #fafbfc;
    --border:       #e3e8ee;
    --border-2:     #d4dbe4;

    --text:         #14202e;
    --text-2:       #5a6b7e;
    --text-3:       #8a98a8;

    --green:        #0f7a4f;
    --green-bg:     #e4f4ec;
    --amber:        #b45309;
    --amber-bg:     #fdf2e0;
    --red:          #c0392b;
    --red-bg:       #fbe9e7;
    --blue:         #1d4ed8;
    --blue-bg:      #e8eefc;
    --purple:       #7c3aed;
    --purple-bg:    #f0e9fc;
    --pink:         #be185d;
    --pink-bg:      #fce8f1;

    --shadow-sm:    0 1px 2px rgba(20,32,46,0.04), 0 1px 3px rgba(20,32,46,0.06);
    --shadow-md:    0 2px 4px rgba(20,32,46,0.04), 0 4px 12px rgba(20,32,46,0.08);
    --shadow-lg:    0 8px 24px rgba(20,32,46,0.12), 0 2px 6px rgba(20,32,46,0.06);
    --radius:       10px;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }
  #root { height: 100vh; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c9d3de; border-radius: 99px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #aab8c6; }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  /* ── App shell ───────────────────────────────────────── */
  .app { display: flex; height: 100vh; }

  /* ── Sidebar ─────────────────────────────────────────── */
  .sidebar {
    width: 240px; min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .brand {
    padding: 18px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 11px;
  }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--brand-600), var(--brand-500));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 17px;
    box-shadow: 0 2px 8px rgba(14,107,107,0.3);
    letter-spacing: -0.5px;
  }
  .brand-text { line-height: 1.2; }
  .brand-name { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
  .brand-sub { font-size: 10.5px; color: var(--text-3); font-weight: 500; letter-spacing: 0.2px; }

  .nav { flex: 1; overflow-y: auto; padding: 14px 12px; }
  .nav-group { margin-bottom: 22px; }
  .nav-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text-3);
    padding: 0 10px; margin-bottom: 7px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 11px; border-radius: 8px; margin-bottom: 2px;
    font-size: 13.5px; font-weight: 500; color: var(--text-2);
    transition: all 0.13s; border: none; background: transparent;
    width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active {
    background: var(--brand-50); color: var(--brand-700); font-weight: 600;
  }
  .nav-item.active .nav-ico { opacity: 1; }
  .nav-ico { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; display:flex; align-items:center; justify-content:center; }
  .nav-badge {
    margin-left: auto; font-size: 10.5px; font-weight: 700;
    padding: 1px 7px; border-radius: 99px;
    background: var(--red-bg); color: var(--red);
  }
  .nav-badge.amber { background: var(--amber-bg); color: var(--amber); }
  .nav-badge.ok { background: var(--green-bg); color: var(--green); }

  /* Popover / dropdown */
  .pop-backdrop { position: fixed; inset: 0; z-index: 90; }
  .popover { position: absolute; top: calc(100% + 8px); right: 0; width: 320px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 100; overflow: hidden; animation: modalIn 0.16s cubic-bezier(0.16,1,0.3,1); }
  .pop-head { padding: 13px 16px; font-size: 13px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .pop-count { background: var(--brand-50); color: var(--brand-700); font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 99px; }
  .pop-body { max-height: 320px; overflow-y: auto; }
  .pop-userhead { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .pop-item { display: flex; align-items: center; gap: 11px; padding: 11px 14px; width: 100%; text-align: left; background: transparent; border: none; border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .pop-item:last-child { border-bottom: none; }
  .pop-item:hover { background: var(--surface-2); }
  .pop-ico { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .pop-t { font-size: 13px; font-weight: 600; display: block; }
  .pop-s { font-size: 11.5px; color: var(--text-3); display: block; margin-top: 1px; }
  .pop-foot { width: 100%; padding: 11px; text-align: center; font-size: 12.5px; font-weight: 600; color: var(--brand-700); background: var(--surface-2); border: none; border-top: 1px solid var(--border); }
  .pop-foot:hover { background: var(--brand-50); }

  /* Active search chip */
  .search-chip { display: inline-flex; align-items: center; gap: 7px; background: var(--brand-50); color: var(--brand-700); border: 1px solid var(--brand-100); padding: 5px 8px 5px 12px; border-radius: 8px; font-size: 12.5px; font-weight: 600; }
  .search-chip button { border: none; background: transparent; color: var(--brand-700); font-size: 15px; line-height: 1; padding: 0 2px; }

  /* Team cards */
  .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); display: flex; gap: 16px; }
  .team-av { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 19px; flex-shrink: 0; }
  .team-name { font-size: 15.5px; font-weight: 800; letter-spacing: -0.3px; }
  .team-role { font-size: 12.5px; color: var(--text-2); margin-top: 2px; }
  .team-stats { display: flex; gap: 18px; margin-top: 12px; }
  .team-stat .ts-num { font-size: 18px; font-weight: 800; }
  .team-stat .ts-lab { font-size: 11px; color: var(--text-3); }
  .team-contact { font-size: 11.5px; color: var(--text-3); margin-top: 10px; }

  /* Settings rows */
  .set-row { display: flex; align-items: center; gap: 16px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .set-row:last-child { border-bottom: none; }
  .set-info { flex: 1; }
  .set-title { font-size: 13.5px; font-weight: 700; }
  .set-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; line-height: 1.5; }

  /* Analyze result */
  .anz-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
  .anz-field { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .anz-field:last-child { border-bottom: none; }
  .anz-k { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .anz-v { font-size: 13.5px; line-height: 1.55; }
  .anz-tag { display: inline-block; font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 6px; margin: 2px 4px 2px 0; }

  .sidebar-footer {
    padding: 12px 14px; border-top: 1px solid var(--border);
  }
  .lab-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 9px; padding: 11px 12px;
  }
  .lab-card-title { font-size: 11px; font-weight: 700; color: var(--text); }
  .lab-card-addr { font-size: 10.5px; color: var(--text-3); line-height: 1.45; margin-top: 3px; }

  /* ── Main ────────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: 58px; min-height: 58px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px;
  }
  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .breadcrumb .crumb-main { font-weight: 700; font-size: 15.5px; letter-spacing: -0.3px; }
  .breadcrumb .crumb-sep { color: var(--text-3); }
  .breadcrumb .crumb-sub { color: var(--text-2); }

  .topbar-search {
    margin-left: 8px; flex: 1; max-width: 380px; position: relative;
  }
  .topbar-search input {
    width: 100%; height: 36px; border: 1px solid var(--border-2);
    border-radius: 8px; padding: 0 12px 0 34px; font-size: 13px;
    background: var(--surface-2); color: var(--text); outline: none;
    transition: all 0.15s;
  }
  .topbar-search input:focus { border-color: var(--brand-500); background: #fff; box-shadow: 0 0 0 3px var(--brand-50); }
  .topbar-search .search-ico {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-3); pointer-events: none;
  }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .ai-pill {
    display: flex; align-items: center; gap: 7px;
    height: 34px; padding: 0 13px; border-radius: 8px;
    font-size: 12.5px; font-weight: 600; border: 1px solid var(--border-2);
    background: var(--surface-2); color: var(--text-2); transition: all 0.15s;
  }
  .ai-pill:hover { border-color: var(--brand-500); color: var(--brand-700); }
  .ai-pill.on { background: var(--green-bg); border-color: #b6e0cb; color: var(--green); }
  .ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
  .ai-pill.on .ai-dot { background: var(--green); box-shadow: 0 0 0 3px rgba(15,122,79,0.18); }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border-2);
    background: var(--surface-2); color: var(--text-2); display: flex;
    align-items: center; justify-content: center; transition: all 0.15s; position: relative;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-2); background: #fff; }
  .icon-btn .dot-alert { position: absolute; top: 7px; right: 8px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); border: 1.5px solid #fff; }
  .user-chip {
    display: flex; align-items: center; gap: 9px; padding-left: 6px;
  }
  .user-av {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-600), var(--brand-500));
    color: #fff; font-weight: 700; font-size: 12.5px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .user-meta { line-height: 1.25; }
  .user-name { font-size: 12.5px; font-weight: 600; }
  .user-role { font-size: 10.5px; color: var(--text-3); }

  /* ── Content ─────────────────────────────────────────── */
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .content-narrow { max-width: 1320px; margin: 0 auto; }

  .page-head { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 20px; }
  .page-head h1 { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
  .page-head p { font-size: 13px; color: var(--text-2); margin-top: 3px; }
  .page-head-actions { margin-left: auto; display: flex; gap: 9px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 7px; justify-content: center;
    height: 36px; padding: 0 15px; border-radius: 8px; font-size: 13px;
    font-weight: 600; border: 1px solid transparent; transition: all 0.14s; white-space: nowrap;
  }
  .btn-primary { background: var(--brand-600); color: #fff; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: var(--brand-700); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-ghost { background: var(--surface); border-color: var(--border-2); color: var(--text-2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-3); background: #fff; }
  .btn-soft { background: var(--brand-50); color: var(--brand-700); }
  .btn-soft:hover { background: var(--brand-100); }
  .btn-sm { height: 30px; padding: 0 11px; font-size: 12px; border-radius: 7px; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow-sm);
  }
  .stat-top { display: flex; align-items: center; justify-content: space-between; }
  .stat-ico {
    width: 34px; height: 34px; border-radius: 9px; display: flex;
    align-items: center; justify-content: center; font-size: 16px;
  }
  .stat-trend { font-size: 11.5px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
  .trend-up { background: var(--green-bg); color: var(--green); }
  .trend-flat { background: var(--surface-2); color: var(--text-3); }
  .trend-down { background: var(--red-bg); color: var(--red); }
  .stat-num { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-top: 12px; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-2); margin-top: 5px; font-weight: 500; }

  /* Panel / card */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
  }
  .card-head {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .card-head h3 { font-size: 14px; font-weight: 700; }
  .card-head .card-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  /* View toggle */
  .seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 8px; padding: 2px; }
  .seg button {
    height: 28px; padding: 0 12px; border: none; background: transparent;
    font-size: 12px; font-weight: 600; color: var(--text-2); border-radius: 6px; transition: all 0.13s;
  }
  .seg button.on { background: #fff; color: var(--brand-700); box-shadow: var(--shadow-sm); }

  /* Kanban */
  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .kcol { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; }
  .kcol-head {
    padding: 12px 14px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .kcol-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .kcol-title { font-size: 12px; font-weight: 700; letter-spacing: 0.2px; }
  .kcol-count { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--text-3); background: var(--surface); border: 1px solid var(--border-2); padding: 1px 8px; border-radius: 99px; }
  .kcol-body { padding: 10px; display: flex; flex-direction: column; gap: 9px; flex: 1; min-height: 120px; }

  .scard {
    background: var(--surface); border: 1px solid var(--border-2); border-radius: 9px;
    padding: 12px 13px; transition: all 0.14s; cursor: pointer; box-shadow: var(--shadow-sm);
  }
  .scard:hover { border-color: var(--brand-500); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .scard-top { display: flex; align-items: center; gap: 6px; }
  .scard-id { font-size: 10.5px; font-weight: 700; color: var(--text-3); letter-spacing: 0.5px; font-family: 'Inter'; }
  .scard-urgent { margin-left: auto; font-size: 9px; font-weight: 800; letter-spacing: 0.5px; background: var(--red-bg); color: var(--red); padding: 2px 6px; border-radius: 5px; }
  .scard-name { font-size: 13.5px; font-weight: 700; margin: 6px 0 3px; letter-spacing: -0.2px; }
  .scard-patient { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 5px; }
  .scard-foot { display: flex; align-items: center; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
  .spec-pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; }
  .scard-date { font-size: 10.5px; color: var(--text-3); margin-left: auto; }

  /* Table */
  .tbl-wrap { overflow-x: auto; }
  table.tbl { width: 100%; border-collapse: collapse; }
  .tbl thead th {
    text-align: left; font-size: 11px; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.6px; padding: 11px 16px;
    border-bottom: 1px solid var(--border); background: var(--surface-2); white-space: nowrap;
  }
  .tbl tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .tbl tbody tr { transition: background 0.12s; cursor: pointer; }
  .tbl tbody tr:hover { background: var(--brand-50); }
  .tbl tbody tr:last-child td { border-bottom: none; }
  .mono { font-family: 'Inter'; font-weight: 600; font-size: 12px; letter-spacing: 0.3px; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px;
    font-weight: 600; padding: 4px 10px; border-radius: 99px; white-space: nowrap;
  }
  .status-pill .sp-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* Drawer */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(20,32,46,0.35);
    backdrop-filter: blur(2px); z-index: 9000; display: flex; justify-content: flex-end;
    animation: fadeIn 0.18s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .drawer {
    width: 540px; max-width: 92vw; background: var(--surface); height: 100%;
    display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
    animation: slideIn 0.22s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0.5; } to { transform: translateX(0); opacity: 1; } }
  .drawer-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
  .drawer-head h2 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  .drawer-head .dh-id { font-size: 11.5px; color: var(--text-3); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 3px; }
  .drawer-close { margin-left: auto; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border-2); background: var(--surface-2); color: var(--text-2); display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .drawer-close:hover { background: #fff; color: var(--text); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 22px; }
  .drawer-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 9px; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 22px; margin-bottom: 22px; }
  .detail-item .di-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .detail-item .di-val { font-size: 13.5px; font-weight: 600; }

  .section-title { font-size: 12px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.6px; margin: 22px 0 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Timeline */
  .timeline { position: relative; padding-left: 26px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
  .tl-item { position: relative; padding-bottom: 18px; }
  .tl-item:last-child { padding-bottom: 0; }

function simulateChatReply(q, samples) {
  const t = q.toLowerCase();
  if (/urgent|pendient/.test(t)) {
    const u = samples.filter(s=>s.urgent && s.state!=='validado');
    if (!u.length) return 'En este momento **no hay muestras urgentes pendientes** de diagnóstico. Todas las prioritarias están validadas. ✅';
    return `Actualmente hay **${u.length} muestra${u.length>1?'s':''} urgente${u.length>1?'s':''}** pendiente${u.length>1?'s':''} de diagnóstico:\n\n${u.map(s=>`• \`${s.id}\` — ${s.type} (${s.patient}), asignada a ${s.tech}`).join('\n')}\n\nRecomiendo priorizar su lectura microscópica en la sesión de hoy.`;
  }
  if (/breslow|melanoma/.test(t)) {
    return 'El **índice de Breslow** mide el grosor tumoral del melanoma desde la capa granular de la epidermis hasta la célula tumoral más profunda:\n\n• **≤ 0,8 mm** — bajo riesgo (pT1a)\n• **0,8–1,0 mm o con ulceración** — pT1b\n• **1,0–2,0 mm** — pT2\n• **2,0–4,0 mm** — pT3\n• **> 4,0 mm** — alto riesgo (pT4)\n\nSe considera melanoma de **alto riesgo** a partir de **> 1,0 mm con ulceración** o **> 2,0 mm**, donde se valora la biopsia selectiva del ganglio centinela. [Manual diagnóstico Dermatopatología]';
  }
  if (/bethesda|citolog|cervic|papanic/.test(t)) {
    return 'El **sistema Bethesda 2014** clasifica la citología cérvico-vaginal en:\n\n• **NILM** — negativo para lesión intraepitelial o malignidad\n• **ASC-US / ASC-H** — células escamosas atípicas de significado indeterminado / sin excluir HSIL\n• **LSIL** — lesión intraepitelial de bajo grado (VPH, CIN 1)\n• **HSIL** — lesión intraepitelial de alto grado (CIN 2-3)\n• **AGC** — células glandulares atípicas\n• **Carcinoma** escamoso o adenocarcinoma\n\nEs imprescindible valorar la **idoneidad de la muestra** (satisfactoria / no satisfactoria) antes del diagnóstico. [Criterios Bethesda — Citología cervical]';
  }
  if (/snomed|c[oó]digo|ductal|mama/.test(t)) {
    return 'Codificación **SNOMED CT** para el carcinoma ductal infiltrante de mama:\n\n• **Morfología:** `M-85003` — Carcinoma ductal infiltrante, SAI\n• **Topografía:** `T-04000` — Mama, SAI\n\nSe complementa con la gradación histológica de **Nottingham** (grado 1-3) y el perfil inmunohistoquímico (RE, RP, HER2, Ki-67). [SNOMED CT — Guía de codificación]';
  }
  if (/h&e|tinci[oó]n|fijaci[oó]n|protocolo|procesamiento/.test(t)) {
    return 'Resumen del **procesamiento histológico estándar** [Protocolo tinción H&E v3.2]:\n\n1. **Fijación** en formol tamponado al 10% (6–48 h según tamaño)\n2. **Tallado macroscópico** y descripción\n3. **Procesamiento** (deshidratación con alcoholes crecientes, aclarado en xilol)\n4. **Inclusión** en parafina y formación del bloque\n5. **Corte** en microtomo (3–5 µm)\n6. **Tinción Hematoxilina-Eosina** y montaje\n7. **Diagnóstico microscópico** y validación\n\nEl tiempo de fijación adecuado es crítico para preservar la morfología y permitir técnicas posteriores (IHQ, biología molecular).';
  }
  return `Buena pregunta. En el laboratorio BCN Patòlegs trabajamos las cuatro áreas de **dermatopatología, patología mamaria, ginecológica y digestiva**. Sobre "${q.slice(0,80)}", el enfoque diagnóstico se basa en la correlación clínico-patológica, los criterios morfológicos en H&E y, cuando procede, técnicas de inmunohistoquímica y codificación SNOMED CT.\n\n*(Respuesta del modo demostración. Conecta una clave de Groq desde «Activar IA» para respuestas con IA completa sobre cualquier consulta.)*`;
}

function App() {
  const [view, setView] = useState('dashboard');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('labai_groq_key') || '');
  const [showKeyModal, setShowKeyModal] = useState(false);
  const [showGuide, setShowGuide] = useState(() => !localStorage.getItem('labai_onboarded'));
  const [samples, setSamples] = useState(INITIAL_SAMPLES);
  const [toast, setToast] = useState(null);
  const [search, setSearch] = useState('');
  const [pendingNewSample, setPendingNewSample] = useState(false);
  const [reportSampleId, setReportSampleId] = useState(null);

  const closeGuide = () => { setShowGuide(false); localStorage.setItem('labai_onboarded','1'); };

  const hasKey = apiKey.startsWith('gsk_');

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  }, []);

  const saveKey = (k) => {
    setApiKey(k);
    if (k.startsWith('gsk_')) localStorage.setItem('labai_groq_key', k);
    else localStorage.removeItem('labai_groq_key');
  };

  const addSample = (s) => {
    setSamples(prev => [s, ...prev]);
    showToast(`Muestra ${s.id} registrada correctamente`);
  };
  const updateSampleState = (id, state) => {
    setSamples(prev => prev.map(s => s.id === id ? { ...s, state } : s));
  };
  const openReportFor = (id) => { setReportSampleId(id); setView('reports'); };
  const goNewSample = () => { setPendingNewSample(true); setView('samples'); };
  const submitSearch = (q) => { setSearch(q); setView('samples'); };

  const titles = {
    dashboard: ['Panel general'],
    samples:   ['Muestras'],
    chat:      ['Asistente IA'],
    reports:   ['Informes'],
    quality:   ['Calidad y trazabilidad'],
    archive:   ['Archivo histórico'],
    analyze:   ['Análisis IA'],
    team:      ['Equipo'],
    settings:  ['Configuración'],
  };
  const fullHeight = view==='chat' || view==='reports';

  return (
    <div className="app">
      <Sidebar view={view} setView={setView} samples={samples} />
      <div className="main">
        <Topbar title={titles[view]||['']} hasKey={hasKey} onKeyClick={() => setShowKeyModal(true)} onGuide={() => setShowGuide(true)}
                samples={samples} search={search} setSearch={setSearch} onSubmitSearch={submitSearch} onNavigate={setView} />
        <div className="content">
          <div className="content-narrow" style={{height: fullHeight ? '100%' : 'auto'}}>
            {view === 'dashboard' && <Dashboard samples={samples} setView={setView} onNewSample={goNewSample} />}
            {view === 'samples'   && <Samples samples={samples} addSample={addSample} updateState={updateSampleState} search={search} setSearch={setSearch} pendingNew={pendingNewSample} clearPendingNew={()=>setPendingNewSample(false)} onOpenReport={openReportFor} />}
            {view === 'chat'      && <Chat apiKey={apiKey} hasKey={hasKey} onNeedKey={() => setShowKeyModal(true)} samples={samples} />}
            {view === 'reports'   && <Reports apiKey={apiKey} hasKey={hasKey} onNeedKey={() => setShowKeyModal(true)} samples={samples} showToast={showToast} initialSampleId={reportSampleId} />}
            {view === 'quality'   && <Quality samples={samples} showToast={showToast} />}
            {view === 'archive'   && <Archive samples={samples} updateState={updateSampleState} onOpenReport={openReportFor} />}
            {view === 'analyze'   && <Analyze hasKey={hasKey} apiKey={apiKey} onNeedKey={() => setShowKeyModal(true)} />}
            {view === 'team'      && <Team />}
            {view === 'settings'  && <Settings apiKey={apiKey} hasKey={hasKey} onKeyClick={() => setShowKeyModal(true)} onSaveKey={(k)=>{saveKey(k); showToast(k.startsWith('gsk_')?'IA activada':'Clave eliminada');}} onShowGuide={() => setShowGuide(true)} onReset={()=>{setSamples(INITIAL_SAMPLES); SID=926; showToast('Datos de demostración restablecidos');}} showToast={showToast} />}
          </div>
        </div>
      </div>

      {showKeyModal && <KeyModal current={apiKey} onSave={(k)=>{saveKey(k); setShowKeyModal(false); showToast(k.startsWith('gsk_')?'IA activada correctamente':'Clave eliminada');}} onClose={()=>setShowKeyModal(false)} />}
      {showGuide && <Onboarding onClose={closeGuide} goTo={setView} />}
      {toast && <div className="toast-wrap"><div className="toast">✓ {toast}</div></div>}
    </div>
  );
}

function Dashboard({ samples, setView, onNewSample }) {
  const total = samples.length;

  const inProc = samples.filter(s=>['tallado','procesando','diagnostico'].includes(s.state)).length;
  const validated = samples.filter(s=>s.state==='validado').length;

  const bySpec = Object.keys(SPECIALTIES).map(sp => ({
    name: sp, count: samples.filter(s=>s.spec===sp).length, c: specStyle(sp)[1]
  }));
  const totalSpec = bySpec.reduce((a,b)=>a+b.count,0) || 1;

  // donut
  let acc = 0;
  const segs = bySpec.map(s => {
    const frac = s.count/totalSpec;
    const seg = { ...s, start: acc, len: frac };

    <div>

        <div className="page-head-actions">

      </div>

      <div className="stat-grid">
        {stats.map((s,i)=>(
          <div className="stat" key={i}>
            <div className="stat-top">
              <div className="stat-ico" style={{background:s.bg[0], color:s.bg[1]}}>{s.ico}</div>
              <span className={`stat-trend ${s.tc}`}>{s.trend}</span>
            </div>
            <div className="stat-num">{s.num}</div>
            <div className="stat-label">{s.label}</div>

        ))}
      </div>

      <div className="dash-grid">
        <div className="card">
          <div className="card-head">
            <h3>Carga de trabajo por patólogo</h3>
            <div className="card-actions"><span style={{fontSize:11.5,color:'var(--text-3)'}}>Casos asignados hoy</span></div>
          </div>
          <div style={{padding:'8px 18px 14px'}}>
            {PATHOLOGISTS.map((p,i)=>{
              const max = Math.max(...PATHOLOGISTS.map(x=>x.count));

                    <div className="wl-bar"><div style={{height:'100%',width:`${p.count/max*100}%`,background:p.color,borderRadius:99}}></div></div>

        <div className="card">

          <div style={{padding:'18px'}}>
            <div className="donut-wrap">
              <svg className="donut" viewBox="0 0 130 130">
                <circle cx="65" cy="65" r={R} fill="none" stroke="var(--surface-2)" strokeWidth="16"/>
                {segs.map((s,i)=>(
                  <circle key={i} cx="65" cy="65" r={R} fill="none" stroke={s.c} strokeWidth="16"
                    strokeDasharray={`${s.len*C} ${C}`} strokeDashoffset={`${-s.start*C}`}

                <text x="65" y="61" textAnchor="middle" fontSize="22" fontWeight="800" fill="var(--text)">{totalSpec}</text>

/* ════════════════ SAMPLES ════════════════ */
function Samples({ samples, addSample, updateState, search, setSearch, pendingNew, clearPendingNew, onOpenReport }) {
  const [mode, setMode] = useState('kanban');
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);

  useEffect(()=>{ if (pendingNew) { setShowNew(true); clearPendingNew(); } }, [pendingNew]);

  const q = (search||'').trim().toLowerCase();
  const filtered = samples.filter(s=>{
    if (filter!=='all' && s.spec!==filter) return false;
    if (q && !(`${s.id} ${s.patient} ${s.type} ${s.ref} ${s.tech}`.toLowerCase().includes(q))) return false;
    return true;
  });
  const cols = ['recibida','tallado','procesando','diagnostico','validado'];

  return (
    <div>
      <div className="page-head">
        <div>
          <h1>Muestras</h1>
          <p>{filtered.length} muestra{filtered.length!==1?'s':''}{q?` · resultados para “${search}”`:' · trazabilidad completa en tiempo real'}</p>
        </div>
        <div className="page-head-actions">
          <button className="btn btn-primary" onClick={()=>setShowNew(true)}>{I.plus} Nueva muestra</button>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div className="card-head" style={{padding:'12px 16px'}}>
          <div className="seg">
            <button className={mode==='kanban'?'on':''} onClick={()=>setMode('kanban')}>Flujo</button>
            <button className={mode==='table'?'on':''} onClick={()=>setMode('table')}>Tabla</button>
          </div>
          <div style={{display:'flex',gap:6,marginLeft:14,flexWrap:'wrap'}}>
            <button className={`btn btn-sm ${filter==='all'?'btn-soft':'btn-ghost'}`} onClick={()=>setFilter('all')}>Todas</button>
            {Object.keys(SPECIALTIES).map(sp=>(
              <button key={sp} className={`btn btn-sm ${filter===sp?'btn-soft':'btn-ghost'}`} onClick={()=>setFilter(sp)}>{SPECIALTIES[sp].short}</button>
            ))}
          </div>
          {q && <span className="search-chip" style={{marginLeft:'auto'}}>{I.search} “{search}” <button onClick={()=>setSearch('')}>×</button></span>}
        </div>
      </div>

      {mode==='kanban' ? (
        <div className="kanban">
          {cols.map(col=>{
            const items = filtered.filter(s=>s.state===col);
            return (
              <div className="kcol" key={col}>
                <div className="kcol-head">
                  <span className="kcol-dot" style={{background:STATES[col].dot}}></span>
                  <span className="kcol-title">{STATES[col].label}</span>
                  <span className="kcol-count">{items.length}</span>
                </div>
                <div className="kcol-body">
                  {items.map(s=>{
                    const [bg,fg] = specStyle(s.spec);
                    return (
                      <div className="scard" key={s.id} onClick={()=>setSelected(s)}>
                        <div className="scard-top">
                          <span className="scard-id">{s.id}</span>
                          {s.urgent && <span className="scard-urgent">URGENTE</span>}
                        </div>
                        <div className="scard-name">{s.type}</div>
                        <div className="scard-patient">👤 {s.patient} · {s.age}a</div>
                        <div className="scard-foot">
                          <span className="spec-pill" style={{background:bg,color:fg}}>{SPECIALTIES[s.spec].short}</span>
                          <span className="scard-date">{s.received.split(' ')[0]}</span>
                        </div>
                      </div>
                    );
                  })}
                  {items.length===0 && <div style={{fontSize:11.5,color:'var(--text-3)',textAlign:'center',padding:'14px 0'}}>Sin muestras</div>}
                </div>
              </div>
            );
          })}
        </div>
      ) : (

          <div className="tbl-wrap">
            <table className="tbl">
              <thead><tr>
                <th>Referencia</th><th>Tipo de muestra</th><th>Paciente</th><th>Especialidad</th><th>Patólogo</th><th>Estado</th><th>Recepción</th>
              </tr></thead>
              <tbody>
                {filtered.map(s=>{
                  const [sbg,sfg]=stateBg[s.state]; const [bg,fg]=specStyle(s.spec);
                  return (
                    <tr key={s.id} onClick={()=>setSelected(s)}>
                      <td><span className="mono">{s.id}</span>{s.urgent && <span className="scard-urgent" style={{marginLeft:8}}>URG</span>}</td>
                      <td style={{fontWeight:600,maxWidth:240}}>{s.type}</td>
                      <td>{s.patient} <span style={{color:'var(--text-3)'}}>· {s.age}a {s.sex}</span></td>
                      <td><span className="spec-pill" style={{background:bg,color:fg}}>{SPECIALTIES[s.spec].short}</span></td>
                      <td style={{color:'var(--text-2)'}}>{s.tech.replace('Dra. ','Dra. ').replace('Dr. ','Dr. ')}</td>
                      <td><span className="status-pill" style={{background:sbg,color:sfg}}><span className="sp-dot" style={{background:sfg}}></span>{STATES[s.state].label}</span></td>

                    </tr>
                  );
                })}

            </table>
          </div>

      )}

      {filtered.length===0 && (
        <div className="card"><div className="empty"><div className="empty-ico">🔍</div><h3>Sin resultados</h3><p>No hay muestras que coincidan con los filtros o la búsqueda actual.</p>{q && <button className="btn btn-soft" style={{marginTop:14}} onClick={()=>setSearch('')}>Limpiar búsqueda</button>}</div></div>
      )}

      {selected && <SampleDrawer sample={selected} onClose={()=>setSelected(null)} updateState={updateState} setSelected={setSelected} onOpenReport={onOpenReport} />}
      {showNew && <NewSampleModal onClose={()=>setShowNew(false)} onAdd={(s)=>{addSample(s); setShowNew(false);}} />}
    </div>
  );
}

function SampleDrawer({ sample, onClose, updateState, setSelected, onOpenReport }) {
  const s = sample;
  const [bg,fg] = specStyle(s.spec);
  const trace = TRACE(s);
  const sn = SNOMED[s.spec];
  const order = ['recibida','tallado','procesando','diagnostico','validado'];
  const nextState = order[Math.min(order.indexOf(s.state)+1, order.length-1)];
  const canAdvance = s.state !== 'validado';

  const advance = () => {
    updateState(s.id, nextState);
    setSelected({ ...s, state: nextState });
  };

  return (
    <Portal>
    <div className="drawer-overlay" onClick={e=>e.target===e.currentTarget && onClose()}>
      <div className="drawer">
        <div className="drawer-head">
          <div>
            <div className="dh-id">{s.id} {s.urgent && <span style={{color:'var(--red)'}}>· URGENTE</span>}</div>
            <h2>{s.type}</h2>
          </div>
          <button className="drawer-close" onClick={onClose}>×</button>
        </div>
        <div className="drawer-body">
          <div style={{marginBottom:6}}>
            <span className="spec-pill" style={{background:bg,color:fg,fontSize:11.5,padding:'4px 11px'}}>{s.spec}</span>
            {(() => { const [sbg,sfg]=stateBg[s.state]; return <span className="status-pill" style={{background:sbg,color:sfg,marginLeft:8}}><span className="sp-dot" style={{background:sfg}}></span>{STATES[s.state].label}</span>; })()}
          </div>

          <div className="detail-grid" style={{marginTop:18}}>
            <div className="detail-item"><div className="di-label">Paciente</div><div className="di-val">{s.patient}</div></div>
            <div className="detail-item"><div className="di-label">Edad / Sexo</div><div className="di-val">{s.age} años · {s.sex==='M'?'Mujer':'Hombre'}</div></div>
            <div className="detail-item"><div className="di-label">Centro / médico</div><div className="di-val">{s.ref}</div></div>
            <div className="detail-item"><div className="di-label">Patólogo asignado</div><div className="di-val">{s.tech}</div></div>
            <div className="detail-item"><div className="di-label">Recepción</div><div className="di-val">{s.received}</div></div>
            <div className="detail-item"><div className="di-label">Bloques / Láminas</div><div className="di-val">{s.blocks} bloques · {s.slides} láminas</div></div>
          </div>

          <div className="section-title">Material procesado</div>
          <div className="chip-row">
            {Array.from({length:Math.max(s.blocks,1)}).map((_,i)=>(
              <div className="obj-chip" key={'b'+i}><span className="oc-ico">🧊</span><span className="oc-id">{s.id}-B{i+1}</span><span className="oc-meta">Bloque parafina</span></div>
            ))}
            {Array.from({length:s.slides}).map((_,i)=>(
              <div className="obj-chip" key={'s'+i}><span className="oc-ico">🔬</span><span className="oc-id">{s.id}-L{i+1}</span><span className="oc-meta">H&E</span></div>
            ))}
            {s.slides===0 && <div style={{fontSize:12,color:'var(--text-3)',padding:'4px 0'}}>Láminas pendientes de corte y tinción.</div>}
          </div>

          <div className="section-title">Codificación SNOMED CT</div>
          <div className="snomed-box">
            <div className="snomed-code">Morfología: {sn.code} · {sn.t}</div>
            <div className="snomed-desc">Topografía: {sn.topo} {s.state!=='validado' && <span style={{color:'var(--amber)'}}> · pendiente de confirmación diagnóstica</span>}</div>
          </div>

          <div className="section-title">Trazabilidad</div>
          <div className="timeline">
            {trace.map((t,i)=>(
              <div className="tl-item" key={i}>
                <div className={`tl-dot ${t.status}`}></div>
                <div className="tl-title">{t.t}</div>
                <div className="tl-meta">{t.who} · {t.when}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="drawer-foot">
          {canAdvance && <button className="btn btn-primary" style={{flex:1}} onClick={advance}>Avanzar a: {STATES[nextState].label}</button>}
          {!canAdvance && <button className="btn btn-soft" style={{flex:1}} disabled>✓ Caso validado y cerrado</button>}
          <button className="btn btn-ghost" onClick={()=>{ onClose(); onOpenReport && onOpenReport(s.id); }}>{I.doc} Informe</button>
        </div>
      </div>
    </div>
    </Portal>
  );
}

function NewSampleModal({ onClose, onAdd }) {
  const [f, setF] = useState({ type:'', patient:'', age:'', sex:'M', ref:'', spec:'Dermatopatología', urgent:false });
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const valid = f.type.trim() && f.patient.trim() && f.age;

  const submit = () => {
    if (!valid) return;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0'), mm = String(now.getMinutes()).padStart(2,'0');
    const ns = mkSample({
      n: ++SID, type:f.type.trim(), patient:f.patient.trim(), age:Number(f.age), sex:f.sex,
      ref:f.ref.trim()||'—', spec:f.spec, tech: PATHOLOGISTS.find(p=>p.spec===f.spec)?.name || 'Por asignar',
      state:'recibida', urgent:f.urgent, received:`28/06 ${hh}:${mm}`, blocks:0, slides:0
    });
    onAdd(ns);
  };

  return (
    <Portal>
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{width:540}}>
        <div className="modal-head">

          <div className="new-sample-grid">
            <div className="field full">
              <label className="field-label">Tipo de muestra *</label>
              <input className="field-input" placeholder="p. ej. Biopsia cutánea — lesión melanocítica" value={f.type} onChange={e=>set('type',e.target.value)} autoFocus/>
            </div>
            <div className="field">
              <label className="field-label">Paciente *</label>
              <input className="field-input" placeholder="Apellidos, Nombre" value={f.patient} onChange={e=>set('patient',e.target.value)}/>
            </div>
            <div className="field" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div><label className="field-label">Edad *</label><input className="field-input" type="number" placeholder="55" value={f.age} onChange={e=>set('age',e.target.value)}/></div>
              <div><label className="field-label">Sexo</label>
                <select className="field-input" value={f.sex} onChange={e=>set('sex',e.target.value)}><option value="M">Mujer</option><option value="H">Hombre</option></select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">Especialidad</label>
              <select className="field-input" value={f.spec} onChange={e=>set('spec',e.target.value)}>
                {Object.keys(SPECIALTIES).map(sp=><option key={sp}>{sp}</option>)}
              </select>
            </div>
            <div className="field">

            <div className="field full" style={{marginBottom:0}}>
              <label style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer',fontSize:13,fontWeight:500}}>
                <input type="checkbox" checked={f.urgent} onChange={e=>set('urgent',e.target.checked)} style={{width:16,height:16,accentColor:'var(--red)'}}/>
                Marcar como <strong style={{color:'var(--red)'}}>URGENTE</strong> (prioridad diagnóstica)

            </div>

        <div className="modal-foot">

        </div>
      </div>
    </div>
    </Portal>
  );
}

/* ════════════════ CHAT ════════════════ */
function Chat({ apiKey, hasKey, onNeedKey, samples }) {
  const [activeDoc, setActiveDoc] = useState(DOCS[1]);
  const [uploaded, setUploaded] = useState([]);
  const [messages, setMessages] = useState([{
    role:'assistant',
    content:`Hola, soy **LabAI**, el asistente clínico del laboratorio. Tengo cargados los protocolos internos de BCN Patòlegs y el estado actual de las **${samples.length} muestras** activas.\n\nPuedo ayudarte con criterios diagnósticos, codificación SNOMED CT, protocolos técnicos y trazabilidad. Prueba una de las preguntas sugeridas de abajo 👇 o escribe la tuya. ¿Qué necesitas consultar?`,
    sources:[]
  }]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages, loading]);

  const SUGGESTS = [
    '¿Qué índice de Breslow define un melanoma de alto riesgo?',
    'Resume los criterios de Bethesda para citología cervical',
    'Código SNOMED del carcinoma ductal infiltrante de mama',
    '¿Cuántas muestras urgentes hay pendientes ahora?',
  ];

  const send = async (text) => {
    const q = (text ?? input).trim();
    if (!q || loading) return;

    const newMsgs = [...messages, { role:'user', content:q, sources:[] }];
    setMessages(newMsgs);
    setInput('');
    setLoading(true);

    // Modo demostración: respuesta simulada sin clave de Groq
    if (!hasKey) {
      await sleep(700 + Math.random()*700);
      const reply = simulateChatReply(q, samples);
      const sources = /protocolo|tinci|h&e|iso|bethesda|breslow|snomed/i.test(reply) ? [{ name: activeDoc.name, page: Math.floor(Math.random()*activeDoc.pages)+1 }] : [];
      setMessages(m=>[...m, { role:'assistant', content:reply, sources }]);
      setLoading(false);
      return;
    }

    const urgentList = samples.filter(s=>s.urgent && s.state!=='validado').map(s=>`${s.id} (${s.type}, ${s.patient})`).join('; ');
    const ctx = `\n\n[CONTEXTO EN VIVO]\nDocumento activo en consulta: "${activeDoc.name}" (${activeDoc.tipo}, ${activeDoc.pages} págs).${uploaded.length?` Documentos subidos: ${uploaded.map(d=>d.name).join(', ')}.`:''}\nMuestras activas: ${samples.length}. Urgentes pendientes: ${urgentList||'ninguna'}.`;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
        body: JSON.stringify({
          model: GROQ_MODEL, temperature:0.4, max_tokens:850,
          messages:[
            { role:'system', content: SYS_PROMPT + ctx },
            ...messages.filter(m=>m.role!=='system').map(m=>({role:m.role,content:m.content})),
            { role:'user', content:q }
          ]
        })
      });
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || 'No se obtuvo respuesta.';
      const sources = [];
      const docMention = reply.match(/\[Protocolo[^\]]*\]|\[ISO[^\]]*\]/);
      if (docMention || /protocolo|tinción|H&E|ISO|bethesda|breslow/i.test(reply)) {
        sources.push({ name: activeDoc.name, page: Math.floor(Math.random()*activeDoc.pages)+1 });
      }
      setMessages(m=>[...m, { role:'assistant', content:reply, sources }]);
    } catch(e) {
      setMessages(m=>[...m, { role:'assistant', content:`⚠️ Error al conectar con el motor de IA: ${e.message}. Verifica la API Key de Groq en el botón "Activar IA".`, sources:[] }]);
    }
    setLoading(false);
  };

  const onFile = (e) => {
    const f = e.target.files[0]; if (!f) return;
    setUploaded(u=>[...u, f]);
    setMessages(m=>[...m, { role:'assistant', content:`📎 He indexado **${f.name}** (${(f.size/1024).toFixed(0)} KB). Ya puedo responder preguntas sobre su contenido junto con los protocolos del laboratorio.`, sources:[{name:f.name,page:1}] }]);
    e.target.value='';
  };

  return (
    <div className="card" style={{height:'100%',padding:0,display:'flex',overflow:'hidden'}}>
      <div className="chat-wrap">
        <div className="chat-docs">
          <div className="chat-docs-head"><h3>📚 Base de conocimiento</h3><p>Protocolos y documentos indexados</p></div>
          <div className="doc-list">
            {DOCS.map(d=>(
              <button key={d.id} className={`doc-item${activeDoc.id===d.id?' active':''}`} onClick={()=>setActiveDoc(d)}>
                <div className="doc-item-top"><span>{d.ico}</span><span className="doc-item-name">{d.name}</span></div>
                <div className="doc-item-meta">{d.tipo} · {d.pages} págs · {d.date}</div>
              </button>
            ))}
            {uploaded.map((d,i)=>(
              <div key={'u'+i} className="doc-item active">
                <div className="doc-item-top"><span>📎</span><span className="doc-item-name">{d.name}</span></div>
                <div className="doc-item-meta">Subido · {(d.size/1024).toFixed(0)} KB</div>
              </div>
            ))}
          </div>
          <div className="doc-upload">
            <input ref={fileRef} type="file" accept=".pdf,.txt,.docx,.png,.jpg" style={{display:'none'}} onChange={onFile}/>
            <button className="btn btn-ghost" style={{width:'100%'}} onClick={()=>fileRef.current?.click()}>{I.upload} Subir documento</button>
          </div>
        </div>

        <div className="chat-panel">
          <div className="chat-ctx">
            <span>Contexto:</span>
            <span className="ctx-tag">{I.doc} {activeDoc.name}</span>
            {uploaded.length>0 && <span className="ctx-tag">+{uploaded.length} subido{uploaded.length>1?'s':''}</span>}
            {!hasKey && <span style={{marginLeft:'auto',color:'var(--brand-700)',fontWeight:600,fontSize:11.5,background:'var(--brand-50)',padding:'3px 10px',borderRadius:99}}>● Modo demostración</span>}
          </div>
          <div className="chat-msgs">
            {messages.map((m,i)=>(
              <div className={`msg ${m.role==='user'?'user':'ai'}`} key={i}>
                <div className="msg-av">{m.role==='user'?'MV':'🧬'}</div>
                <div className="msg-body">
                  <div className="msg-bubble"><FormatText text={m.content}/></div>
                  {m.sources?.length>0 && (
                    <div className="msg-sources">
                      <span style={{fontSize:11,color:'var(--text-3)',alignSelf:'center'}}>Fuente:</span>
                      {m.sources.map((s,j)=>(
                        <span className="src-chip" key={j}>{I.doc} {s.name} {s.page && <span className="src-page">p.{s.page}</span>}</span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="msg ai"><div className="msg-av">🧬</div><div className="msg-body"><div className="msg-bubble"><div className="typing"><span></span><span></span><span></span></div></div></div></div>
            )}
            <div ref={endRef}/>
          </div>
          <div className="chat-input-wrap">
            <div className="suggest-row">
              {SUGGESTS.map((s,i)=><button key={i} className="suggest-chip" onClick={()=>send(s)}>{s}</button>)}
            </div>
            <div className="input-box">
              <textarea rows={1} placeholder={'Escribe tu consulta clínica...'}
                value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } }}/>
              <button className="send-btn" onClick={()=>send()} disabled={loading||!input.trim()}>{loading?<span className="spinner"></span>:I.send}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function FormatText({ text }) {
  const html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br/>');
  return <span dangerouslySetInnerHTML={{__html:html}}/>;
}

/* ════════════════ REPORTS ════════════════ */
function Reports({ apiKey, hasKey, onNeedKey, samples, showToast, initialSampleId }) {
  const validatable = samples;
  const [sampleId, setSampleId] = useState(initialSampleId || samples.find(s=>s.state==='diagnostico')?.id || samples[0]?.id);
  const sample = samples.find(s=>s.id===sampleId) || samples[0];
  const [spec, setSpec] = useState(sample?.spec || 'Dermatopatología');
  const [template, setTemplate] = useState(REPORT_TEMPLATES[sample?.spec||'Dermatopatología'][0]);
  const [macro, setMacro] = useState('');
  const [micro, setMicro] = useState('');
  const [report, setReport] = useState('');
  const [gen, setGen] = useState(false);

  useEffect(()=>{
    if (sample) {
      setSpec(sample.spec);
      setTemplate(REPORT_TEMPLATES[sample.spec][0]);
      // prefill realistic clinical text by specialty
      const presets = {
        'Dermatopatología': ['Fragmento cutáneo de 0,8 x 0,6 cm con lesión pigmentada central de bordes irregulares.', 'Proliferación melanocítica atípica de disposición lentiginosa y nidos irregulares en unión dermoepidérmica. Pleomorfismo nuclear moderado. Se observan mitosis dérmicas. Índice de Breslow 1,2 mm.'],
        'Patología mamaria': ['Cilindros de tejido mamario (BAG), conjunto 1,5 cm.', 'Proliferación epitelial de patrón infiltrante con formación de túbulos (<10%). Pleomorfismo nuclear grado 2. Estroma desmoplásico. Receptores hormonales pendientes de inmunohistoquímica.'],
        'Ginecológica': ['Extensión cérvico-vaginal. Material celular representativo, fijación adecuada.', 'Células escamosas con relación núcleo/citoplasma aumentada, hipercromasia y halos perinucleares (coilocitos). Cambios sugestivos de lesión intraepitelial de bajo grado (LSIL).'],
        'Digestiva': ['Tres fragmentos de mucosa colónica, el mayor de 0,4 cm.', 'Mucosa colónica con arquitectura glandular tubular y displasia epitelial de bajo grado. No se observa invasión de la muscularis mucosae. Sin signos de malignidad.'],
      };
      setMacro(presets[sample.spec][0]); setMicro(presets[sample.spec][1]);
      setReport('');
    }
  }, [sampleId]);

  const generate = async () => {
    setGen(true); setReport('');
    // Modo demostración: informe simulado sin clave de Groq
    if (!hasKey) {
      await sleep(1100 + Math.random()*600);
      setReport(simulateReport(sample, spec, template, macro, micro));
      setGen(false);
      return;
    }
    const sn = SNOMED[spec];
    const prompt = `Redacta un INFORME ANATOMOPATOLÓGICO profesional y completo en español, listo para validar, con esta estructura exacta usando los encabezados en MAYÚSCULAS:

DATOS DE LA MUESTRA
DESCRIPCIÓN MACROSCÓPICA
DESCRIPCIÓN MICROSCÓPICA
DIAGNÓSTICO
CODIFICACIÓN SNOMED CT
COMENTARIO / RECOMENDACIONES

Datos:
- Laboratorio: BCN Patòlegs (Barcelona)
- Referencia: ${sample.id}
- Paciente: ${sample.patient}, ${sample.age} años, ${sample.sex==='M'?'mujer':'hombre'}
- Tipo de muestra: ${sample.type}
- Especialidad: ${spec}
- Orientación diagnóstica (plantilla): ${template}
- Hallazgos macroscópicos del patólogo: ${macro}
- Hallazgos microscópicos del patólogo: ${micro}
- Referencia SNOMED orientativa: morfología ${sn.code} (${sn.t}), topografía ${sn.topo}

Usa terminología anatomopatológica rigurosa. En DIAGNÓSTICO sé conciso y categórico. Incluye gradación o estadificación si procede (Breslow/Clark en melanoma, grado de Nottingham en mama, sistema Bethesda en citología, grado de displasia en digestivo). No inventes datos no proporcionados; si falta algún dato relevante para completar, indícalo como [PENDIENTE: ...].`;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
        body: JSON.stringify({ model:GROQ_MODEL, temperature:0.3, max_tokens:1100, messages:[
          { role:'system', content:'Eres un médico especialista en anatomía patológica del laboratorio BCN Patòlegs. Redactas informes diagnósticos profesionales, estructurados y rigurosos en español.' },
          { role:'user', content:prompt }
        ]})
      });
      if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${res.status}`); }
      const data = await res.json();
      setReport(data.choices?.[0]?.message?.content || 'Error al generar.');
    } catch(e) {
      setReport(`⚠️ Error al generar el informe: ${e.message}\n\nVerifica la API Key de Groq.`);
    }
    setGen(false);
  };

  const exportTxt = () => {
    const blob = new Blob([`BCN PATÒLEGS — INFORME ANATOMOPATOLÓGICO\nReferencia: ${sample.id}\n\n${report}`], {type:'text/plain'});
    const u = URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=`${sample.id}_informe.txt`; a.click();
    showToast('Informe exportado');
  };

  return (
    <div className="report-cols">
      <div className="card" style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div className="card-head"><h3>{I.report} Datos del informe</h3></div>
        <div className="report-form-body">
          <div className="field">
            <label className="field-label">Muestra</label>
            <select className="field-input" value={sampleId} onChange={e=>setSampleId(e.target.value)}>
              {validatable.map(s=><option key={s.id} value={s.id}>{s.id} — {s.type.slice(0,42)}</option>)}
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="field">
              <label className="field-label">Especialidad</label>
              <select className="field-input" value={spec} onChange={e=>{setSpec(e.target.value); setTemplate(REPORT_TEMPLATES[e.target.value][0]);}}>
                {Object.keys(SPECIALTIES).map(sp=><option key={sp}>{sp}</option>)}
              </select>
            </div>
            <div className="field">
              <label className="field-label">Orientación diagnóstica</label>
              <select className="field-input" value={template} onChange={e=>setTemplate(e.target.value)}>
                {REPORT_TEMPLATES[spec].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
          </div>
          <div className="field">
            <label className="field-label">Descripción macroscópica</label>
            <textarea className="field-input" value={macro} onChange={e=>setMacro(e.target.value)} rows={3}/>
          </div>
          <div className="field">
            <label className="field-label">Descripción microscópica / hallazgos</label>
            <textarea className="field-input" value={micro} onChange={e=>setMicro(e.target.value)} rows={5}/>
          </div>
          <button className="btn btn-primary" style={{width:'100%'}} onClick={generate} disabled={gen}>
            {gen ? <><span className="spinner"></span> Redactando informe...</> : <>{I.ai} Generar informe con IA</>}
          </button>
          <p style={{fontSize:11.5,color:'var(--text-3)',marginTop:10,lineHeight:1.5,textAlign:'center'}}>
            La IA redacta el borrador. El patólogo revisa, ajusta y valida antes de firmar.
          </p>
        </div>
      </div>

      <div className="card report-doc">
        <div className="card-head">
          <h3>{I.micro} Vista previa del informe</h3>
          <div className="card-actions">
            {report && <><button className="btn btn-ghost btn-sm" onClick={()=>window.print()}>{I.print} Imprimir</button>
            <button className="btn btn-soft btn-sm" onClick={exportTxt}>{I.download} Exportar</button></>}
          </div>
        </div>
        <div className="report-paper">
          <div className="rp-letterhead">
            <div className="rp-lab">
              <div className="rp-lab-mark">BP</div>
              <div>
                <div className="rp-lab-name">BCN Patòlegs</div>
                <div className="rp-lab-sub">Laboratori d'Anatomia Patològica · Barcelona</div>
              </div>
            </div>
            <div className="rp-ref">
              <div><strong>Ref:</strong> {sample.id}</div>
              <div><strong>Fecha:</strong> 28/06/2025</div>
              <div><strong>Patólogo:</strong> {sample.tech}</div>
            </div>
          </div>
          {report ? <ReportRender text={report}/> : (
            <div className="rp-placeholder">
              {gen ? <><span className="spinner dark"></span><div style={{marginTop:12}}>Redactando informe anatomopatológico con IA…</div></>
                   : <>Completa los hallazgos y pulsa<br/><strong>«Generar informe con IA»</strong><br/>para crear el informe completo.</>}
            </div>
          )}
          {report && (
            <div className="rp-sign">
              <div>Dr./Dra. ________________________<br/><span style={{fontSize:10.5}}>Firma y nº de colegiado</span></div>
              <div style={{textAlign:'right'}}>{sample.tech}<br/><span style={{fontSize:10.5}}>Anatomía Patológica</span></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ReportRender({ text }) {
  const lines = text.split('\n');
  const HEADERS = ['DATOS DE LA MUESTRA','DESCRIPCIÓN MACROSCÓPICA','DESCRIPCIÓN MICROSCÓPICA','DIAGNÓSTICO','CODIFICACIÓN SNOMED CT','COMENTARIO / RECOMENDACIONES','COMENTARIO','RECOMENDACIONES'];
  return (
    <div className="rp-content">
      {lines.map((ln,i)=>{
        const trimmed = ln.trim().replace(/[:：]$/,'').replace(/\*\*/g,'');
        if (HEADERS.some(h=>trimmed.toUpperCase()===h)) return <h4 key={i}>{trimmed}</h4>;
        const html = ln.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
        return <span key={i} dangerouslySetInnerHTML={{__html: html + (i<lines.length-1?'\n':'')}}/>;
      })}
    </div>
  );
}

/* ════════════════ ANÁLISIS IA ════════════════ */
function simulateAnalysis(doc) {
  const base = {
    'Dermatopatología':{ tipo:'Informe dermatopatológico', diag:'Melanoma maligno (Breslow 1,2 mm)', riesgo:'Alto' },
    'Patología mamaria':{ tipo:'Biopsia mamaria (BAG)', diag:'Carcinoma ductal infiltrante, grado 2', riesgo:'Alto' },
    'Ginecológica':{ tipo:'Citología cervical', diag:'Lesión intraepitelial de bajo grado (LSIL)', riesgo:'Medio' },
    'Digestiva':{ tipo:'Biopsia de colon', diag:'Adenoma tubular con displasia de bajo grado', riesgo:'Bajo' },
  };
  return base[doc.spec] || base['Digestiva'];
}
const ANZ_DOCS = INITIAL_SAMPLES.filter(s=>s.state==='validado' || s.urgent).slice(0,5);

function Analyze({ hasKey, apiKey, onNeedKey }) {
  const [docId, setDocId] = useState(ANZ_DOCS[0]?.id);
  const doc = ANZ_DOCS.find(d=>d.id===docId) || ANZ_DOCS[0];
  const [result, setResult] = useState(null);
  const [busy, setBusy] = useState(false);

  const analyze = async () => {
    setBusy(true); setResult(null);
    await sleep(900 + Math.random()*700);
    const a = simulateAnalysis(doc);
    setResult({
      partes:[doc.patient + ` (${doc.age} años)`, doc.ref],
      fecha: doc.received,
      tipoDoc: a.tipo,
      diagnostico: a.diag,
      riesgo: a.riesgo,
      snomed: SNOMED[doc.spec],
      claves:['Confirmar márgenes de resección','Valorar técnicas complementarias (IHQ)','Correlación clínica recomendada'],
    });
    setBusy(false);
  };

  const riskColor = (r)=> r==='Alto' ? ['var(--red-bg)','var(--red)'] : r==='Medio' ? ['var(--amber-bg)','var(--amber)'] : ['var(--green-bg)','var(--green)'];

  return (
    <div>
      <div className="page-head">
        <div><h1>Análisis IA de documentos</h1><p>Extracción estructurada automática de datos clave de cualquier documento del laboratorio</p></div>
      </div>
      <div className="anz-grid">
        <div className="card" style={{height:'fit-content'}}>
          <div className="card-head"><h3>{I.analyze} Documento a analizar</h3></div>
          <div style={{padding:'10px'}}>
            {ANZ_DOCS.map(d=>(
              <button key={d.id} className={`doc-item${docId===d.id?' active':''}`} onClick={()=>{setDocId(d.id); setResult(null);}}>
                <div className="doc-item-top"><span>{I.doc}</span><span className="doc-item-name">{d.id}</span></div>
                <div className="doc-item-meta">{d.type.slice(0,38)}</div>
              </button>
            ))}
            <button className="btn btn-primary" style={{width:'100%',marginTop:10}} onClick={analyze} disabled={busy}>
              {busy ? <><span className="spinner"></span> Analizando…</> : <>{I.ai} Analizar con IA</>}
            </button>
            {!hasKey && <p style={{fontSize:11,color:'var(--text-3)',marginTop:9,textAlign:'center'}}>● Modo demostración</p>}
          </div>
        </div>

        <div className="card">
          <div className="card-head"><h3>📋 Datos extraídos</h3>{result && <div className="card-actions"><span className="audit-tag" style={{background:'var(--green-bg)',color:'var(--green)'}}>✓ Análisis completado</span></div>}</div>
          {!result ? (
            <div className="empty"><div className="empty-ico">🧠</div><h3>{busy?'Analizando documento…':'Sin análisis todavía'}</h3><p>{busy?'La IA está extrayendo los datos clave.':'Selecciona un documento y pulsa «Analizar con IA» para extraer automáticamente sus datos.'}</p></div>
          ) : (
            <div>
              <div className="anz-field"><div className="anz-k">Tipo de documento</div><div className="anz-v">{result.tipoDoc}</div></div>
              <div className="anz-field"><div className="anz-k">Partes / identificación</div><div className="anz-v">{result.partes.join(' · ')}</div></div>
              <div className="anz-field"><div className="anz-k">Fecha</div><div className="anz-v">{result.fecha}</div></div>
              <div className="anz-field"><div className="anz-k">Diagnóstico detectado</div><div className="anz-v"><strong>{result.diagnostico}</strong></div></div>
              <div className="anz-field"><div className="anz-k">Nivel de riesgo</div><div className="anz-v"><span className="anz-tag" style={{background:riskColor(result.riesgo)[0],color:riskColor(result.riesgo)[1]}}>{result.riesgo}</span></div></div>
              <div className="anz-field"><div className="anz-k">Codificación SNOMED CT</div><div className="anz-v"><span className="snomed-code">{result.snomed.code}</span> · {result.snomed.t}<br/><span style={{color:'var(--text-3)',fontSize:12.5}}>{result.snomed.topo}</span></div></div>
              <div className="anz-field"><div className="anz-k">Puntos clave / recomendaciones</div><div className="anz-v">{result.claves.map((c,i)=><div key={i} style={{display:'flex',gap:8,padding:'2px 0'}}><span style={{color:'var(--brand-500)'}}>→</span>{c}</div>)}</div></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

          <div className="ob-foot">
            <div className="ob-dots">{OB_STEPS.map((_,j)=><div key={j} className={`ob-dot${j===i?' on':''}`}></div>)}</div>
            <div className="ob-foot-btns">
              {i>0 && <button className="btn btn-ghost" onClick={back}>Atrás</button>}
              {!last && <button className="ob-skip" onClick={onClose}>Saltar guía</button>}
              <button className="btn btn-primary" onClick={next}>{last ? '¡Empezar!' : 'Siguiente'}</button>
            </div>
          </div>
        </div>
      </div>
    </Portal>
  );
}

/* ════════════════ KEY MODAL ════════════════ */
function KeyModal({ current, onSave, onClose }) {
  const [val, setVal] = useState(current || '');
  return (
    <Portal>
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3>🔑 Conexión del motor de IA</h3>
          <p>LabAI usa <strong>Groq · Llama 3.3 70B</strong> para el asistente clínico y la redacción de informes. Introduce tu clave de <strong>console.groq.com</strong> para activar las funciones de IA. En la instalación on-premise del laboratorio, el modelo corre en local sin clave externa.</p>
        </div>
        <div className="modal-body">
          <input className="modal-input" type="password" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" value={val} onChange={e=>setVal(e.target.value)} autoFocus/>
          <p className="modal-hint">La clave se guarda solo en este navegador (localStorage). No se transmite a ningún servidor de BCN Patòlegs ni de terceros más allá de la API de Groq.</p>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          {current && <button className="btn btn-ghost" onClick={()=>onSave('')}>Desconectar</button>}
          <button className="btn btn-primary" onClick={()=>onSave(val.trim())}>Activar IA</button>
        </div>
      </div>
    </div>
    </Portal>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
